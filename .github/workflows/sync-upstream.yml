name: Sync fork with upstream

on:
  schedule:
    - cron: '0 21 * * *'  # daily at 9pm UTC / 4pm EST — after upstream's peak activity window
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: personal
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: git remote add upstream https://github.com/sandydargoport/prism.git && git fetch upstream

      # Keep master as a clean mirror of upstream — no personal commits ever land here.
      - name: Reset master to upstream
        run: |
          git checkout master
          git reset --hard upstream/master
          git push origin master --force

      # Merge upstream changes into personal so customizations stay current.
      # Fails loudly on conflicts so they can be resolved manually.
      - name: Merge upstream into personal
        run: |
          git checkout personal
          git merge --no-edit upstream/master
          git push origin personal
