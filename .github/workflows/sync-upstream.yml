name: Sync fork with upstream

on:
  schedule:
    - cron: '0 20 * * *'  # 4pm ET (EDT/UTC-4); shifts to 3pm ET during EST
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sandydargoport/prism.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Reset upstream branch to match upstream repo
        run: |
          git checkout upstream
          git reset --hard upstream/master
          git push origin upstream --force

      - name: Reset master to match upstream
        run: |
          git checkout master
          git reset --hard upstream/master
          git push origin master --force

      - name: Merge upstream into personal
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          git checkout personal
          if git merge upstream/master --no-edit; then
            git push origin personal
          else
            git merge --abort
            # Open a conflict issue only if one isn't already open
            open_issue=$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --label "upstream-conflict" \
              --state open \
              --json number \
              --jq 'length')
            if [ "$open_issue" -eq 0 ]; then
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "Action required: upstream merge conflict on personal branch" \
                --label "upstream-conflict" \
                --body "The daily upstream sync could not automatically merge \`upstream/master\` into \`personal\` due to a conflict.

  Resolve locally:
  \`\`\`bash
  git fetch origin
  git checkout personal
  git merge origin/master
  # fix conflicts, then:
  git push origin personal
  \`\`\`
  Close this issue once the conflict is resolved."
            fi
          fi
